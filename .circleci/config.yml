version: 2.1

orbs:
  python: circleci/python@2.1.1

# Özel komutlarımız
commands:
  check-python:
    steps:
      - run:
          command: python3 --version
          name: Python Sürümünü Kontrol Et
      - run:
          command: pip3 --version
          name: Pip Sürümünü Kontrol Et
  wait-for-render:
    steps:
      - run:
          # Render'ın Docker dosyasını derleyip API'yi ayağa kaldırması için süre tanıyoruz
          command: sleep 180
          name: Render Sunucusunun Ayağa Kalkmasını Bekle

jobs:
  install-build:
    docker:
        - image: cimg/python:3.11.4
    steps:
      - checkout
      - check-python
      - run: 
          command: source ./tools/install.sh
          name: Bağımlılıkları Yükle
      - run:
          command: source ./venv/bin/activate && python3 ./ml/build.py
          name: Veriyi Hazırla (Build)
      - persist_to_workspace:
          root: .
          paths:
            - venv
            - ml
            - tools

  train:
    docker:
        - image: cimg/python:3.11.4
    steps:
      - attach_workspace:
          at: .
      - run:
          command: source ./venv/bin/activate && python3 ./ml/train.py
          name: Modeli Eğit (Train)
      - persist_to_workspace:
          root: .
          paths:
            - ml

  test:
    docker:
        - image: cimg/python:3.11.4
    steps:
      - attach_workspace:
          at: .
      - run:
          command: source ./venv/bin/activate && python3 ./ml/test.py
          name: Modeli Test Et (Quality Gate)

  retrain:
    docker:
        - image: cimg/python:3.11.4
    steps:
      - attach_workspace:
          at: .
      - run:
          command: source ./venv/bin/activate && python3 ./ml/retrain.py
          name: Modeli Yeniden Eğit (Retrain)
      - run:
          name: Hata Durumunda Çalış (Alarm)
          command: |
              echo "Yeniden eğitim başarısız oldu! Model kalitesi düştü." 
          when: on_fail
      - persist_to_workspace:
          root: .
          paths:
            - ml

  deploy:
    docker:
        - image: cimg/python:3.11.4
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Render'a Dağıtım Sinyali Gönder (Webhook)
          command: |
            echo "Render Deploy Hook tetikleniyor..."
            if [ -z "$RENDER_DEPLOY_HOOK" ]; then
              echo "UYARI: RENDER_DEPLOY_HOOK çevresel değişkeni bulunamadı. Lütfen CircleCI arayüzünden ekleyin."
            else
              curl -X POST $RENDER_DEPLOY_HOOK
              echo "Dağıtım başarıyla tetiklendi!"
            fi

  test-deployment:
    docker:
        - image: cimg/python:3.11.4
    steps:
      - attach_workspace:
          at: .
      - wait-for-render
      - run:
          command: source ./venv/bin/activate && python3 ./ml/test_deployed_model.py
          name: Canlı API Testi (E2E)

# İş Akışları (Workflows)
workflows:
  build-deploy:
    jobs:
      - install-build:
          filters:
            branches:
              only:
                - main
      - train:
          requires: 
            - install-build
      - test:
          requires: 
            - train
      - deploy:
          requires: 
            - test 
      - test-deployment:
          requires:
            - deploy

  retrain-deploy:
    triggers:
      - schedule:
          cron: "0 0 * * *" # Her gece 00:00'da
          filters:
            branches:
              only:
                - retrain
    jobs:
      - install-build
      - retrain:
          requires:
            - install-build
      - hold: 
          requires: 
            - retrain
          type: approval 
      - deploy:
          requires:
            - hold
      - test-deployment:
          requires:
            - deploy